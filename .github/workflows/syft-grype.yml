name: syft + grype vulnerability scan

on:
  schedule:
    - cron: '0 8 * * *'
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syft-grype-scan:
    name: SBOM Generation (Syft) + Vulnerability Scan (Grype)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to upload SARIF results to the GitHub Security tab
      security-events: write

    steps:
      # ── 1. Checkout so Syft can walk the full source tree ──────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Syft via official install script ────────────────────────
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      # ── 3. Generate SBOM — CycloneDX JSON is the format Grype natively reads
      - name: Generate SBOM with Syft
        run: syft . -o cyclonedx-json=sbom.cyclonedx.json

      # ── 4. Syft summary — package table written to the Actions job summary ─
      - name: Write Syft summary
        run: |
          echo "## 📦 SBOM — Packages Detected by Syft" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          syft . -o table 2>/dev/null >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 5. Upload SBOM so it can be audited or consumed by downstream tools ─
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_number }}
          path: sbom.cyclonedx.json
          retention-days: 30

      # ── 6. Install Grype via official install script ───────────────────────
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      # ── 7. Scan the SBOM — SARIF for Security tab, table for the summary ──
      - name: Scan SBOM with Grype
        run: grype sbom:sbom.cyclonedx.json -o sarif > grype-results.sarif; true

      # ── 8. Grype summary — vulnerability table written to Actions summary ──
      - name: Write Grype summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔍 Vulnerability Scan Results (Grype)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          GRYPE_OUT=$(grype sbom:sbom.cyclonedx.json -o table 2>/dev/null)
          VULN_COUNT=$(echo "$GRYPE_OUT" | tail -n +2 | grep -c . || true)
          echo "**Total findings: ${VULN_COUNT}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$GRYPE_OUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 9. Surface findings in the GitHub Security tab ─────────────────────
      - name: Upload Grype SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif

      # ── 10. Keep raw SARIF as a downloadable artifact ──────────────────────
      - name: Upload Grype SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-sarif-${{ github.run_number }}
          path: grype-results.sarif
          if-no-files-found: ignore
          retention-days: 30

name: OSV Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:
    branches: [main, master]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  actions:        read
  contents:       read
  security-events: write   # required to upload SARIF to GitHub Code Scanning

jobs:
  # ── Runs on PRs: diffs vulnerabilities introduced by the change ───────────────
  scan-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        ./
    permissions:
      actions:         read
      contents:        read
      security-events: write

  # ── Runs on push to main + daily schedule: full repo scan ─────────────────────
  scan-full:
    if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        ./
    permissions:
      actions:         read
      contents:        read
      security-events: write

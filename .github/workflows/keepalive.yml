name: Keepalive

on:
  schedule:
    - cron: '0 8 * * 0'   # Every Sunday at 8 AM UTC (well within 60-day window)
  workflow_dispatch:

permissions:
  actions: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            for (const wf of workflows.data.workflows) {
              if (wf.state === 'disabled_inactivity') {
                await github.rest.actions.enableWorkflow({
                  owner:       context.repo.owner,
                  repo:        context.repo.repo,
                  workflow_id: wf.id,
                });
                console.log(`Re-enabled: ${wf.name}`);
              }
            }

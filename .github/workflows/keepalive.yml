name: Keepalive

on:
  schedule:
    - cron: '0 8 1 * *'   # 1st of every month — well within the 60-day window
  workflow_dispatch:

permissions:
  contents: write   # needed to push the keepalive commit

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Commit keepalive timestamp
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u > .github/keepalive
          git add .github/keepalive
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: keepalive [skip ci]"
          git push
